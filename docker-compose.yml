services:
  api:
    build:
      context: ./backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://127.0.0.1:8001}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://127.0.0.1:8501}
      DATABASE_URL: sqlite:////data/app.db
      UPLOADS_DIR: /data/uploads
      DEBUG: "false"
    volumes:
      - pg_api_data:/data
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    environment:
      POST_GENERATOR_API_URL: ${POST_GENERATOR_API_URL:-http://api:8001}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://127.0.0.1:8501}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg_api_data:
